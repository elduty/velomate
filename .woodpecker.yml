labels:
  platform: macos
  backend: local

when:
  - event: [push, pull_request, manual]

clone:
  disable: true

steps:
  - name: test
    image: local
    commands:
      - git clone ssh://git@10.7.40.20:2222/MrMartian/veloai.git --branch main --depth 1 /tmp/veloai-ci-src
      - cd /tmp/veloai-ci-src
      - python3 -m venv /tmp/veloai-ci-venv
      - /tmp/veloai-ci-venv/bin/pip install -q -r requirements.txt pytest
      - set -o pipefail && /tmp/veloai-ci-venv/bin/python3 -m pytest tests/ -q 2>&1 | tee /tmp/pytest-output.txt
      - rm -rf /tmp/veloai-ci-src /tmp/veloai-ci-venv

  - name: notify-failure
    image: local
    when:
      - status: failure
    environment:
      OPENCLAW_HOOKS_TOKEN:
        from_secret: openclaw_hooks_token
    commands:
      - python3 ci/notify.py
