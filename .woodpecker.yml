labels:
  platform: macos
  backend: local

when:
  - event: [push, pull_request, manual]

steps:
  - name: test
    image: bash
    commands:
      - python3 -m venv /tmp/velomate-ci-venv
      - /tmp/velomate-ci-venv/bin/pip install -q -r requirements.txt pytest
      - set -o pipefail && /tmp/velomate-ci-venv/bin/python3 -m pytest tests/ -q 2>&1 | tee /tmp/pytest-output.txt
