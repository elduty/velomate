labels:
  platform: macos
  backend: local

when:
  - event: [push, pull_request, manual]

steps:
  - name: test
    image: local
    commands:
      - python3 -m venv /tmp/veloai-ci-venv
      - /tmp/veloai-ci-venv/bin/pip install -q -r requirements.txt pytest
      - set -o pipefail && /tmp/veloai-ci-venv/bin/python3 -m pytest tests/ -q 2>&1 | tee /tmp/pytest-output.txt

  - name: notify-failure
    image: local
    when:
      - status: failure
    environment:
      OPENCLAW_HOOKS_TOKEN:
        from_secret: openclaw_hooks_token
    commands:
      - python3 ci/notify.py
