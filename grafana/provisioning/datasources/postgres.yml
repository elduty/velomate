apiVersion: 1
datasources:
  - name: VeloMate
    uid: velomate
    type: postgres
    access: proxy
    url: velomate-postgres:5432
    user: velomate
    orgId: 1
    secureJsonData:
      password: ${POSTGRES_PASSWORD}
    jsonData:
      database: velomate
      sslmode: disable
      timescaledb: false
      postgresVersion: 1500
    editable: true
    isDefault: true
