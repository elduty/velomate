name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python (GitHub)
        if: env.GITEA_ACTIONS != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up venv (Gitea)
        if: env.GITEA_ACTIONS == 'true'
        run: |
          python3.12 -m venv /tmp/velomate-ci-venv
          curl -sS https://bootstrap.pypa.io/get-pip.py | /tmp/velomate-ci-venv/bin/python3
          echo "/tmp/velomate-ci-venv/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: |
          python3 -m pip install -r requirements.txt
          python3 -m pip install pytest pytest-cov

      - name: Run tests with coverage
        run: python3 -m pytest tests/ -q --cov=velomate --cov=ingestor --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        if: env.GITEA_ACTIONS != 'true'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          fail_ci_if_error: false
