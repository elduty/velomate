version: "3.9"

services:
  veloai-postgres:
    container_name: veloai-postgres
    image: postgres:15
    environment:
      POSTGRES_DB: veloai
      POSTGRES_USER: veloai
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - veloai-postgres-data:/var/lib/postgresql/data
    ports:
      - "5423:5432"
    restart: unless-stopped

  veloai-ingestor:
    container_name: veloai-ingestor
    build: ./ingestor
    environment:
      DATABASE_URL: postgresql://veloai:${POSTGRES_PASSWORD}@veloai-postgres:5432/veloai
      STRAVA_CLIENT_ID: ${STRAVA_CLIENT_ID}
      STRAVA_CLIENT_SECRET: ${STRAVA_CLIENT_SECRET}
      STRAVA_REFRESH_TOKEN: ${STRAVA_REFRESH_TOKEN}
      KOMOOT_EMAIL: ${KOMOOT_EMAIL}
      KOMOOT_PASSWORD: ${KOMOOT_PASSWORD}
      POLL_INTERVAL_MINUTES: 10
      PYTHONUNBUFFERED: "1"
    depends_on:
      - veloai-postgres
    restart: unless-stopped

  veloai-grafana:
    container_name: veloai-grafana
    image: grafana/grafana:latest
    ports:
      - "3021:3000"
    volumes:
      - veloai-grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_SERVER_ROOT_URL: https://veloai.mrmartian.in/
      GF_SERVER_SERVE_FROM_SUB_PATH: "false"
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      - veloai-postgres
    restart: unless-stopped

volumes:
  veloai-postgres-data:
  veloai-grafana-data:
